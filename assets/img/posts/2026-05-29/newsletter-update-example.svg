<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Masanam blog newsletter update email example</title>
  <desc id="desc">An example image of the Masanam blog newsletter update email design.</desc>
  <defs>
