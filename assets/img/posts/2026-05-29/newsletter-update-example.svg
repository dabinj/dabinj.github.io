      <stop offset="0%" stop-color="#4e7cff" stop-opacity="0.28"/>
      <stop offset="42%" stop-color="#4e7cff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b0d12" stop-opacity="0"/>
