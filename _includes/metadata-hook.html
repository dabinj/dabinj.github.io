<meta name="naver-site-verification" content="0efbb1c454a66efa3b51ddafd5b9e5cc18eb10f2">

{% assign seo_image = page.seo_image | default: page.image.path | default: page.image | default: site.avatar %}
{% assign seo_image_url = seo_image | absolute_url %}

<meta name="robots" content="max-image-preview:large">
<meta property="og:image" content="{{ seo_image_url }}">
<meta property="og:image:secure_url" content="{{ seo_image_url }}">
<meta name="twitter:image" content="{{ seo_image_url }}">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "{{ page.url | absolute_url }}#webpage",
  "url": "{{ page.url | absolute_url }}",
  "primaryImageOfPage": {
    "@type": "ImageObject",
    "url": "{{ seo_image_url }}",
    "contentUrl": "{{ seo_image_url }}"
  }
}
</script>
